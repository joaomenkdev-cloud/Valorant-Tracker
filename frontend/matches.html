<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCI Analytics — Match History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <header class="topbar" id="topbar"></header>

  <main class="page-content">

    <div class="ph">
      <h2>Match History</h2>
      <p>Last 20 competitive matches — use filters to narrow results</p>
    </div>

    <!-- Filters -->
    <div class="mf">
      <select class="f-sel" id="mfAgent">
        <option value="">All Agents</option>
      </select>
      <select class="f-sel" id="mfMap">
        <option value="">All Maps</option>
      </select>
      <select class="f-sel" id="mfResult">
        <option value="">All Results</option>
        <option value="win">Victory</option>
        <option value="loss">Defeat</option>
      </select>
      <button class="btn-clear" id="clearMf">Clear filters</button>
    </div>

    <!-- Matches Table Header -->
    <div style="display:grid;grid-template-columns:64px 1fr 1fr repeat(4,76px);gap:10px;padding:7px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;margin-bottom:-5px;">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3)">Result</div>
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3)">Agent / Map</div>
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3)">Date</div>
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);text-align:center">KDA</div>
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);text-align:center">K/D</div>
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);text-align:center">ACS</div>
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);text-align:center">RR</div>
    </div>

    <!-- Match rows (rendered by JS) -->
    <div class="matches-list" id="matchList"></div>

  </main>
</div>


<script src="js/api.js"></script>
<script src="js/shared.js"></script>
<script src="js/matches.js"></script>
</body>
</html>
